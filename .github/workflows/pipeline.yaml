name: ci-pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Use an LTS version for better security/stability
          cache: 'npm'     # Optional: speeds up your workflow by caching dependencies

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test